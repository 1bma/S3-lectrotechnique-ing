<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculateur de moyenne S3 & S4 — Génie Electrotechnique</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.22.20/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Tajawal:wght@400;500;700;900&display=swap');

    * { box-sizing: border-box; }

    body {
      font-family: 'Tajawal', 'Inter', sans-serif;
      margin: 0;
    }

    :root {
      --accent: #10b981;
      --accent-dark: #059669;
      --accent-light: #d1fae5;
    }

    /* Number inputs */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }

    /* Smooth transitions */
    .fade-in { animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* Progress bar animation */
    .bar-fill { transition: width 0.6s cubic-bezier(.4,0,.2,1); }

    /* Toast */
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: #1f2937; color: #fff; padding: 0.65rem 1.4rem;
      border-radius: 999px; font-size: 0.85rem; font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      z-index: 9999; pointer-events: none;
      animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
    }
    @keyframes toastIn  { from { opacity:0; bottom:0.5rem } to { opacity:1; bottom:1.5rem } }
    @keyframes toastOut { from { opacity:1 } to { opacity:0 } }

    /* Tooltip */
    .tip-wrap { position: relative; display: inline-block; }
    .tip-wrap:hover .tip-box { opacity:1; pointer-events:auto; }
    .tip-box {
      opacity: 0; pointer-events: none;
      position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
      background: #1f2937; color: #fff; font-size: 0.7rem;
      padding: 0.4rem 0.7rem; border-radius: 8px; white-space: nowrap;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2); transition: opacity 0.18s;
      z-index: 50;
    }
    .tip-box::after {
      content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%);
      border:5px solid transparent; border-top-color:#1f2937;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 99px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

/* ─── DATA ─────────────────────────────────────────────────── */
const SEMESTER_DATA = {
  s3: {
    label: 'Semestre 03',
    credits: 30,
    units: [
      {
        id: 'uef1_s3', name: '(U.E.F) A00F0001S3',
        subjects: [
          { id: 'analyseNum', name: 'Analyse numérique 1',    coef: 3, credits: 6, weights: { td: 0.2, tp: 0.2, exam: 0.6 }, fields: ['td','tp','exam'] },
          { id: 'analyse3',   name: 'Analyse 3',              coef: 3, credits: 6, weights: { td: 0.4, exam: 0.6 },           fields: ['td','exam'] },
        ]
      },
      {
        id: 'uef2_s3', name: '(U.E.F) A00F0002S3',
        subjects: [
          { id: 'electricite', name: 'Eléctricité fondamentale', coef: 3, credits: 5, weights: { td: 0.2, tp: 0.2, exam: 0.6 }, fields: ['td','tp','exam'] },
          { id: 'mecanique',   name: 'Mécanique rationnelle',    coef: 2, credits: 3, weights: { td: 0.4, exam: 0.6 },           fields: ['td','exam'] },
          { id: 'ondes',       name: 'Ondes et vibrations',      coef: 3, credits: 5, weights: { td: 0.2, tp: 0.2, exam: 0.6 }, fields: ['td','tp','exam'] },
        ]
      },
      {
        id: 'uem_s3', name: '(U.E.M) A00M0001S3',
        subjects: [
          { id: 'dao',    name: 'Dessin assisté par ordinateur', coef: 1, credits: 2, weights: { exam: 1.0 }, fields: ['exam'] },
          { id: 'python', name: 'Programmation Python',          coef: 2, credits: 2, weights: { tp: 0.4, exam: 0.6 }, fields: ['tp','exam'] },
        ]
      },
      {
        id: 'uet_s3', name: '(U.E.T) A00T0001S3',
        subjects: [
          { id: 'energie',   name: 'Energie et environnement',     coef: 1, credits: 1, weights: { exam: 1.0 }, fields: ['exam'] },
          { id: 'materiaux', name: 'Matériaux en génie électrique', coef: 1, credits: 1, weights: { exam: 1.0 }, fields: ['exam'] },
        ]
      },
    ]
  },
  s4: {
    label: 'Semestre 04',
    credits: 30,
    units: [
      {
        id: 'uef1_s4', name: '(U.E.F) A00F0001S4',
        subjects: [
          { id: 'signal',        name: 'Théorie du signal',         coef: 2, credits: 4, weights: { td: 0.4, exam: 0.6 }, fields: ['td','exam'] },
          { id: 'electroniqueF', name: 'Electronique fondamentale', coef: 2, credits: 4, weights: { td: 0.4, exam: 0.6 }, fields: ['td','exam'] },
        ]
      },
      {
        id: 'uef2_s4', name: '(U.E.F) A00F0002S4',
        subjects: [
          { id: 'electromag',   name: 'Electromagnétisme appliqué',          coef: 2, credits: 4, weights: { td: 0.4, exam: 0.6 },           fields: ['td','exam'] },
          { id: 'electrotechF', name: 'Electrotechnique fondamentale',        coef: 2, credits: 4, weights: { td: 0.4, exam: 0.6 },           fields: ['td','exam'] },
          { id: 'lcs',          name: 'Logique combinatoire et séquentielle', coef: 3, credits: 5, weights: { td: 0.2, tp: 0.2, exam: 0.6 }, fields: ['td','tp','exam'] },
        ]
      },
      {
        id: 'uem_s4', name: '(U.E.M) A00M0001S4',
        subjects: [
          { id: 'analyseNum2', name: 'Analyse Numérique 2',                                 coef: 2, credits: 3, weights: { tp: 0.4, exam: 0.6 }, fields: ['tp','exam'] },
          { id: 'mesures',     name: 'Mesures et métrologie',                                coef: 2, credits: 3, weights: { tp: 0.4, exam: 0.6 }, fields: ['tp','exam'] },
          { id: 'tpElec',      name: "TP Electronique et électrotechnique",                  coef: 1, credits: 2, weights: { tp: 1.0 }, fields: ['tp'] },
        ]
      },
      {
        id: 'uet_s4', name: '(U.E.T) A00T0001S4',
        subjects: [
          { id: 'teic', name: "Techniques d'information et de communication", coef: 2, credits: 4, weights: { td: 0.4, exam: 0.6 }, fields: ['td','exam'] },
        ]
      },
      {
        id: 'ued_s4', name: '(U.E.D) A00D0001S4',
        subjects: [
          { id: 'tdee', name: 'Technologies des dispositifs électriques et électroniques', coef: 1, credits: 1, weights: { exam: 1.0 }, fields: ['exam'] },
        ]
      },
    ]
  }
};

const FIELD_LABELS = { td: 'TD', tp: 'TP', exam: 'Examen' };

/* ─── HELPERS ───────────────────────────────────────────────── */
const initGrades = () => {
  const g = {};
  Object.values(SEMESTER_DATA).forEach(sem =>
    sem.units.forEach(u =>
      u.subjects.forEach(s => {
        g[s.id] = {};
        s.fields.forEach(f => { g[s.id][f] = ''; });
      })
    )
  );
  return g;
};

const loadGrades = () => {
  try {
    const saved = localStorage.getItem('uubma_grades_v2');
    if (saved) return JSON.parse(saved);
  } catch {}
  return initGrades();
};

const mention = (n) => {
  if (n >= 16) return { label: 'Excellent',  color: 'text-emerald-500', emoji: '🏆' };
  if (n >= 14) return { label: 'Très bien',  color: 'text-blue-500',    emoji: '⭐' };
  if (n >= 12) return { label: 'Bien',       color: 'text-sky-500',     emoji: '👍' };
  if (n >= 10) return { label: 'Passable',   color: 'text-yellow-500',  emoji: '✅' };
  return           { label: 'Échec',       color: 'text-red-500',     emoji: '❌' };
};

const barColor = (v) => {
  if (v >= 16) return 'bg-emerald-500';
  if (v >= 14) return 'bg-blue-500';
  if (v >= 12) return 'bg-sky-500';
  if (v >= 10) return 'bg-yellow-500';
  return 'bg-red-500';
};

/* ─── COMPONENTS ────────────────────────────────────────────── */

function ProgressBar({ value, dark }) {
  const pct = Math.min(100, (value / 20) * 100);
  return (
    <div className={`w-full rounded-full h-2 mt-1.5 ${dark ? 'bg-gray-700' : 'bg-gray-200'}`}>
      <div
        className={`bar-fill h-2 rounded-full ${barColor(value)}`}
        style={{ width: `${pct}%` }}
      />
    </div>
  );
}

function MentionBadge({ value }) {
  const m = mention(value);
  return (
    <span className={`text-xs font-bold px-2 py-0.5 rounded-full bg-current/10 ${m.color}`}>
      {m.emoji} {m.label}
    </span>
  );
}

function Tooltip({ text, children }) {
  return (
    <span className="tip-wrap">
      {children}
      <span className="tip-box">{text}</span>
    </span>
  );
}

function Toast({ msg }) {
  return <div className="toast">{msg}</div>;
}

function GradeInput({ value, onChange, dark }) {
  const [local, setLocal] = useState(value === '' ? '' : String(value));
  const [err, setErr] = useState(false);

  useEffect(() => {
    setLocal(value === '' ? '' : String(value));
  }, [value]);

  const handleChange = (v) => {
    setLocal(v);
    if (v === '') { setErr(false); onChange(''); return; }
    const n = parseFloat(v);
    if (isNaN(n) || n < 0 || n > 20) { setErr(true); return; }
    setErr(false);
    onChange(n); // live update on every keystroke
  };

  const handleBlur = (v) => {
    if (v === '' || isNaN(parseFloat(v))) return;
    const snapped = Math.round(parseFloat(v) * 4) / 4; // snap to 0.25 on blur
    setLocal(String(snapped));
    onChange(snapped);
  };

  return (
    <input
      type="number" min="0" max="20" step="0.25"
      value={local}
      onChange={e => handleChange(e.target.value)}
      onBlur={e => handleBlur(e.target.value)}
      className={`
        w-16 text-center font-bold px-1.5 py-1.5 rounded-lg text-sm outline-none
        transition-all focus:ring-2
        ${err
          ? 'border-2 border-red-500 focus:ring-red-400 bg-red-50 text-red-700'
          : dark
            ? 'bg-gray-700 border border-gray-600 text-white focus:ring-emerald-500'
            : 'bg-white border border-gray-300 text-gray-900 focus:ring-emerald-400'
        }
      `}
      placeholder="—"
    />
  );
}

/* ─── MAIN APP ───────────────────────────────────────────────── */
function App() {
  const [dark, setDark] = useState(false);
  const [tab, setTab]   = useState('s3');
  const [grades, setGrades] = useState(loadGrades);
  const [toast, setToast]   = useState(null);

  /* Auto-save */
  useEffect(() => {
    try { localStorage.setItem('uubma_grades_v2', JSON.stringify(grades)); }
    catch {}
  }, [grades]);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2000);
  };

  const handleChange = useCallback((id, field, val) => {
    setGrades(p => ({ ...p, [id]: { ...p[id], [field]: val } }));
  }, []);

  const resetSemester = (semKey) => {
    const next = { ...grades };
    SEMESTER_DATA[semKey].units.forEach(u =>
      u.subjects.forEach(s =>
        s.fields.forEach(f => { next[s.id] = { ...next[s.id], [f]: '' }; })
      )
    );
    setGrades(next);
    showToast(`✅ ${SEMESTER_DATA[semKey].label} réinitialisé`);
  };

  const resetAll = () => {
    setGrades(initGrades());
    showToast('🗑️ Toutes les notes effacées');
  };

  /* Calc */
  const subjectAvg = (s) =>
    s.fields.reduce((sum, f) => sum + (parseFloat(grades[s.id]?.[f]) || 0) * s.weights[f], 0);

  const unitAvg = (unit) => {
    let pts = 0, coefs = 0;
    unit.subjects.forEach(s => { pts += subjectAvg(s) * s.coef; coefs += s.coef; });
    return coefs ? pts / coefs : 0;
  };

  const semesterStats = (semKey) => {
    const sem = SEMESTER_DATA[semKey];
    let pts = 0, coefs = 0, earnedCredits = 0;
    sem.units.forEach(u => u.subjects.forEach(s => {
      const a = subjectAvg(s);
      pts += a * s.coef; coefs += s.coef;
      if (a >= 10) earnedCredits += s.credits;
    }));
    const avg = coefs ? pts / coefs : 0;
    return { avg: avg.toFixed(2), earnedCredits, totalCredits: sem.credits };
  };

  const s3Stats = semesterStats('s3');
  const s4Stats = semesterStats('s4');
  const yearlyAvg = ((parseFloat(s3Stats.avg) + parseFloat(s4Stats.avg)) / 2).toFixed(2);
  const totalEarned = s3Stats.earnedCredits + s4Stats.earnedCredits;

  /* Theme tokens */
  const bg      = dark ? 'bg-gray-950 text-white'  : 'bg-slate-100 text-gray-900';
  const card    = dark ? 'bg-gray-900 border-gray-800' : 'bg-white border-gray-200';
  const subText = dark ? 'text-gray-200' : 'text-gray-800';
  const dimText = dark ? 'text-gray-500' : 'text-gray-400';
  const rowBorder = dark ? 'border-gray-800' : 'border-gray-100';
  const failRow   = dark ? 'bg-red-950/30'  : 'bg-red-50/60';

  const sem = SEMESTER_DATA[tab];
  const curStats = tab === 's3' ? s3Stats : s4Stats;

  return (
    <div className={`min-h-screen ${bg} transition-colors duration-300 pb-14`}>

      {/* ── HEADER ── */}
      <header className="bg-emerald-600 text-white px-5 py-4 flex items-center justify-between shadow-lg sticky top-0 z-40">
        <div className="flex items-center gap-2.5">
          <div className="bg-emerald-500 rounded-xl p-1.5">
            <i className="fa-solid fa-graduation-cap text-lg"></i>
          </div>
          <div>
            <p className="font-black text-sm leading-tight">Academic Transcripts</p>
            <p className="text-[10px] text-emerald-200 leading-tight">Univ. Blida 1 · Génie Electrotechnique</p>
          </div>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={resetAll} title="Réinitialiser tout"
            className="p-2 rounded-xl bg-emerald-700/60 hover:bg-red-600 transition-all text-xs">
            <i className="fa-solid fa-trash-can"></i>
          </button>
          <button onClick={() => setDark(!dark)}
            className="p-2 rounded-xl bg-emerald-700/60 hover:bg-emerald-800 transition-all">
            <i className={`fa-solid ${dark ? 'fa-sun text-yellow-300' : 'fa-moon'}`}></i>
          </button>
        </div>
      </header>

      <div className="max-w-2xl mx-auto px-4 pt-5">

        {/* ── YEARLY BANNER ── */}
        <div className={`rounded-2xl mb-5 p-4 border ${card} shadow-md`}>
          <div className="flex items-center justify-between mb-3">
            <span className={`text-xs font-bold uppercase tracking-widest ${dimText}`}>2ème Année</span>
            <span className={`text-xs font-semibold px-2 py-0.5 rounded-full bg-emerald-500/10 text-emerald-500`}>
              {totalEarned} / 60 crédits
            </span>
          </div>
          <div className="flex items-end justify-between gap-3">
            <div>
              <p className={`text-4xl font-black ${parseFloat(yearlyAvg) >= 10 ? 'text-emerald-500' : 'text-red-500'}`}>
                {yearlyAvg}
                <span className={`text-sm font-bold ml-1 ${dimText}`}>/20</span>
              </p>
              <MentionBadge value={parseFloat(yearlyAvg)} />
            </div>
            <div className="flex gap-4 text-center">
              {['s3','s4'].map(k => {
                const st = k === 's3' ? s3Stats : s4Stats;
                const m = mention(parseFloat(st.avg));
                return (
                  <div key={k} onClick={() => setTab(k)}
                    className={`cursor-pointer rounded-xl px-3 py-2 transition-all border-2 ${
                      tab === k
                        ? 'border-emerald-500 bg-emerald-500/10'
                        : dark ? 'border-gray-700 hover:border-gray-600' : 'border-gray-200 hover:border-gray-300'
                    }`}>
                    <p className={`text-[10px] font-bold uppercase ${dimText}`}>{k.toUpperCase()}</p>
                    <p className={`text-lg font-black ${m.color}`}>{st.avg}</p>
                    <p className={`text-[9px] ${dimText}`}>{st.earnedCredits}/{SEMESTER_DATA[k].credits} cr</p>
                  </div>
                );
              })}
            </div>
          </div>
          <ProgressBar value={parseFloat(yearlyAvg)} dark={dark} />
        </div>

        {/* ── TABS ── */}
        <div className={`flex gap-3 mb-4 p-1 rounded-2xl border ${card} shadow-sm`}>
          {['s3','s4'].map(s => (
            <button key={s} onClick={() => setTab(s)}
              className={`flex-1 py-2.5 rounded-xl font-bold text-sm transition-all ${
                tab === s
                  ? 'bg-emerald-600 text-white shadow-md'
                  : dark ? 'text-gray-400 hover:text-white' : 'text-gray-500 hover:text-gray-800'
              }`}>
              {SEMESTER_DATA[s].label}
            </button>
          ))}
        </div>

        {/* ── SEMESTER CARD ── */}
        <div className={`${card} rounded-2xl shadow-lg border overflow-hidden mb-5 fade-in`} key={tab}>

          {/* Card header */}
          <div className="flex items-center justify-between px-5 py-4 border-b border-current/5">
            <div>
              <h2 className="font-black text-base text-emerald-500">{sem.label}</h2>
              <p className={`text-xs ${dimText}`}>
                Moyenne : <span className={`font-bold ${parseFloat(curStats.avg) >= 10 ? 'text-emerald-500' : 'text-red-500'}`}>{curStats.avg}</span>
                &nbsp;·&nbsp;
                Crédits : <span className="font-bold">{curStats.earnedCredits}/{sem.credits}</span>
              </p>
            </div>
            <div className="flex items-center gap-2">
              <MentionBadge value={parseFloat(curStats.avg)} />
              <button onClick={() => resetSemester(tab)} title="Réinitialiser ce semestre"
                className={`text-xs px-2.5 py-1.5 rounded-lg border font-bold transition-all hover:bg-red-500 hover:text-white hover:border-red-500 ${
                  dark ? 'border-gray-700 text-gray-400' : 'border-gray-300 text-gray-400'
                }`}>
                <i className="fa-solid fa-rotate-left mr-1"></i>Reset
              </button>
            </div>
          </div>

          {/* Progress */}
          <div className="px-5 pt-3 pb-1">
            <ProgressBar value={parseFloat(curStats.avg)} dark={dark} />
            <div className="flex justify-between text-[9px] font-bold mt-1" style={{direction:'ltr'}}>
              <span className="text-red-400">0</span>
              <span className="text-yellow-400">10</span>
              <span className="text-emerald-400">20</span>
            </div>
          </div>

          {/* Column labels */}
          <div className={`flex text-[10px] font-bold uppercase tracking-wider ${dimText} px-5 pt-3 pb-2 border-b ${rowBorder}`} dir="ltr">
            <span className="flex-1 text-left">Module</span>
            <span className="w-10 text-center">Coef</span>
            <span className="w-10 text-center">Cr</span>
            <span className="w-16 text-right">Moy</span>
          </div>

          {/* Units */}
          {sem.units.map(unit => (
            <div key={unit.id} className={`border-b last:border-0 ${rowBorder}`}>
              {unit.subjects.map(s => {
                const a = subjectAvg(s);
                const failing = a < 10 && s.fields.some(f => grades[s.id]?.[f] !== '');
                return (
                  <div key={s.id} className={`px-5 py-3 border-b last:border-0 ${rowBorder} ${failing ? failRow : ''} transition-colors`}>
                    {/* Subject row */}
                    <div className="flex items-center gap-1 mb-2" dir="ltr">
                      {failing && (
                        <Tooltip text="Note < 10 — Module non validé">
                          <span className="text-red-400 text-xs mr-1 cursor-help"><i className="fa-solid fa-circle-exclamation"></i></span>
                        </Tooltip>
                      )}
                      <span className={`flex-1 font-semibold text-sm ${subText} text-left leading-tight`}>{s.name}</span>
                      <Tooltip text={`Coefficient : ${s.coef}`}>
                        <span className={`w-10 text-center text-xs font-bold ${dimText} cursor-help`}>{s.coef}</span>
                      </Tooltip>
                      <Tooltip text={`${s.credits} crédits — acquis si moyenne ≥ 10`}>
                        <span className={`w-10 text-center text-xs ${dimText} cursor-help`}>{s.credits}</span>
                      </Tooltip>
                      <span className={`w-16 text-right text-sm font-black ${a >= 10 ? 'text-emerald-500' : failing ? 'text-red-500' : dimText}`}>
                        {a.toFixed(2)}
                      </span>
                    </div>

                    {/* Inputs */}
                    <div className="flex gap-2 flex-wrap" dir="ltr">
                      {s.fields.map(f => (
                        <div key={f} className={`flex flex-col items-start rounded-xl p-2 border ${dark ? 'bg-gray-800/60 border-gray-700' : 'bg-gray-50 border-gray-200'}`}>
                          <span className={`text-[9px] font-black uppercase mb-1 ${dimText}`}>
                            {FIELD_LABELS[f]} <span className="opacity-60">({(s.weights[f]*100).toFixed(0)}%)</span>
                          </span>
                          <GradeInput
                            value={grades[s.id]?.[f] ?? ''}
                            onChange={v => handleChange(s.id, f, v)}
                            dark={dark}
                          />
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}

              {/* Unit summary */}
              <div className={`flex items-center px-5 py-2.5 ${
                unitAvg(unit) >= 10
                  ? dark ? 'bg-emerald-950/30' : 'bg-emerald-50'
                  : dark ? 'bg-red-950/30'     : 'bg-red-50'
              }`} dir="ltr">
                <i className={`fa-solid fa-layer-group text-xs mr-2 ${unitAvg(unit) >= 10 ? 'text-emerald-400' : 'text-red-400'}`}></i>
                <span className={`flex-1 text-xs font-bold truncate ${unitAvg(unit) >= 10 ? 'text-emerald-600' : 'text-red-500'}`}>{unit.name}</span>
                <span className={`text-sm font-black ml-2 ${unitAvg(unit) >= 10 ? 'text-emerald-600' : 'text-red-500'}`}>
                  {unitAvg(unit).toFixed(2)}
                </span>
              </div>
            </div>
          ))}
        </div>

        {/* ── STATS ROW ── */}
        <div className="grid grid-cols-3 gap-3 mb-6">
          {[
            { label: 'Moyenne S3', value: s3Stats.avg,  sub: `${s3Stats.earnedCredits}/${SEMESTER_DATA.s3.credits} cr` },
            { label: 'Moyenne S4', value: s4Stats.avg,  sub: `${s4Stats.earnedCredits}/${SEMESTER_DATA.s4.credits} cr` },
            { label: 'Moyenne Annuelle', value: yearlyAvg, sub: `${totalEarned}/60 cr`, hero: true },
          ].map(({ label, value, sub, hero }) => {
            const m = mention(parseFloat(value));
            return (
              <div key={label} className={`rounded-2xl border shadow-md p-3 text-center flex flex-col justify-between transition-all ${
                hero
                  ? 'bg-emerald-600 text-white border-emerald-500 scale-[1.04]'
                  : `${card}`
              }`}>
                <p className={`text-[10px] font-black uppercase tracking-wide mb-1 ${hero ? 'text-emerald-200' : dimText}`}>{label}</p>
                <p className={`text-2xl font-black ${hero ? 'text-white' : m.color}`}>{value}</p>
                <p className={`text-[9px] font-bold mt-0.5 ${hero ? 'text-emerald-200' : dimText}`}>{sub}</p>
                <p className={`text-[10px] mt-1 ${hero ? 'text-emerald-100 font-bold' : `${m.color} font-semibold`}`}>{m.emoji} {m.label}</p>
              </div>
            );
          })}
        </div>

        {/* ── LEGEND ── */}
        <div className={`${card} border rounded-2xl p-4 mb-6 shadow-sm`}>
          <p className={`text-[10px] font-black uppercase tracking-widest mb-3 ${dimText}`}>Système de notation</p>
          <div className="grid grid-cols-2 gap-y-1.5 gap-x-4" dir="ltr">
            {[
              { range: '16 – 20', label: 'Excellent',  color: 'bg-emerald-500' },
              { range: '14 – 15', label: 'Très bien',  color: 'bg-blue-500' },
              { range: '12 – 13', label: 'Bien',       color: 'bg-sky-500' },
              { range: '10 – 11', label: 'Passable',   color: 'bg-yellow-500' },
              { range: '0  –  9', label: 'Échec',      color: 'bg-red-500' },
            ].map(r => (
              <div key={r.range} className="flex items-center gap-2">
                <span className={`w-2 h-2 rounded-full flex-shrink-0 ${r.color}`}></span>
                <span className={`text-[11px] font-bold ${dimText}`}>{r.range}</span>
                <span className={`text-[11px] ${subText}`}>{r.label}</span>
              </div>
            ))}
          </div>
        </div>

        {/* ── FOOTER ── */}
        <div className="text-center">
          <a href="https://t.me/uubma" target="_blank" rel="noopener noreferrer"
            className="inline-flex items-center gap-2 bg-blue-500 hover:bg-blue-600 active:scale-95 text-white font-bold px-6 py-3 rounded-2xl shadow-md transition-all text-sm">
            <i className="fa-brands fa-telegram text-lg"></i>
            Me contacter sur Telegram
          </a>
          <p className={`text-[10px] mt-3 font-semibold tracking-wide ${dimText}`}>
            Données sauvegardées automatiquement · Univ. Blida 1
          </p>
        </div>
      </div>

      {/* Toast */}
      {toast && <Toast msg={toast} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
