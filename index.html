<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة المعدل S3 & S4 - هندسة كهروتقنية</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const semesterData = {
  s3: {
    label: 'Semestre 03',
    units: [
      {
        id: 'uef1_s3',
        name: '(U.E.F) A00F0001S3',
        subjects: [
          { id: 'analyseNum', name: 'Analyse numérique 1', coef: 3, weights: { td: 0.2, tp: 0.2, exam: 0.6 }, fields: ['td', 'tp', 'exam'] },
          { id: 'analyse3',   name: 'Analyse 3',           coef: 3, weights: { td: 0.4, exam: 0.6 },           fields: ['td', 'exam'] },
        ]
      },
      {
        id: 'uef2_s3',
        name: '(U.E.F) A00F0001S3',
        subjects: [
          { id: 'electricite', name: 'Eléctricité fondamentale', coef: 3, weights: { td: 0.2, tp: 0.2, exam: 0.6 }, fields: ['td', 'tp', 'exam'] },
          { id: 'mecanique',   name: 'Mécanique rationnelle',    coef: 2, weights: { td: 0.4, exam: 0.6 },           fields: ['td', 'exam'] },
          { id: 'ondes',       name: 'Ondes et vibrations',      coef: 3, weights: { td: 0.2, tp: 0.2, exam: 0.6 }, fields: ['td', 'tp', 'exam'] },
        ]
      },
      {
        id: 'uem_s3',
        name: '(U.E.M) A00M0001S3',
        subjects: [
          { id: 'dao',    name: 'Dessin assisté par ordinateur', coef: 1, weights: { exam: 1.0 }, fields: ['exam'] },
          { id: 'python', name: 'Programmation Python',          coef: 2, weights: { tp: 0.4, exam: 0.6 }, fields: ['tp', 'exam'] },
        ]
      },
      {
        id: 'uet_s3',
        name: '(U.E.T) A00T0001S3',
        subjects: [
          { id: 'energie',   name: 'Energie et environnement',     coef: 1, weights: { exam: 1.0 }, fields: ['exam'] },
          { id: 'materiaux', name: 'Matériaux en génie électrique', coef: 1, weights: { exam: 1.0 }, fields: ['exam'] },
        ]
      },
    ]
  },
  s4: {
    label: 'Semestre 04',
    units: [
      {
        id: 'uef1_s4',
        name: '(U.E.F) A00F0001S4',
        subjects: [
          { id: 'signal',        name: 'Théorie du signal',         coef: 2, weights: { td: 0.4, exam: 0.6 }, fields: ['td', 'exam'] },
          { id: 'electroniqueF', name: 'Electronique fondamentale', coef: 2, weights: { td: 0.4, exam: 0.6 }, fields: ['td', 'exam'] },
        ]
      },
      {
        id: 'uef2_s4',
        name: '(U.E.F) A00F0001S4',
        subjects: [
          { id: 'electromag',   name: 'Electromagnétisme appliqué',            coef: 2, weights: { td: 0.4, exam: 0.6 },           fields: ['td', 'exam'] },
          { id: 'electrotechF', name: 'Electrotechnique fondamentale',          coef: 2, weights: { td: 0.4, exam: 0.6 },           fields: ['td', 'exam'] },
          { id: 'lcs',          name: 'Logique combinatoire et séquentielle',   coef: 3, weights: { td: 0.2, tp: 0.2, exam: 0.6 }, fields: ['td', 'tp', 'exam'] },
        ]
      },
      {
        id: 'uem_s4',
        name: '(U.E.M) A00M0001S4',
        subjects: [
          { id: 'analyseNum2', name: 'Analyse Numérique 2',                              coef: 2, weights: { tp: 0.4, exam: 0.6 }, fields: ['tp', 'exam'] },
          { id: 'mesures',     name: 'Mesures et métrologie',                             coef: 2, weights: { tp: 0.4, exam: 0.6 }, fields: ['tp', 'exam'] },
          { id: 'tpElec',      name: "Travaux pratiques d'Electronique et électrotechnique", coef: 1, weights: { tp: 1.0 }, fields: ['tp'] },
        ]
      },
      {
        id: 'uet_s4',
        name: '(U.E.T) A00T0001S4',
        subjects: [
          { id: 'teic', name: "Techniques d'information et de communication", coef: 2, weights: { td: 0.4, exam: 0.6 }, fields: ['td', 'exam'] },
        ]
      },
      {
        id: 'ued_s4',
        name: '(U.E.D) A00D0001S4',
        subjects: [
          { id: 'tdee', name: 'Technologies des dispositifs électriques et électroniques', coef: 1, weights: { exam: 1.0 }, fields: ['exam'] },
        ]
      },
    ]
  }
};

const initGrades = (data) => {
  const g = {};
  Object.values(data).forEach(sem =>
    sem.units.forEach(u =>
      u.subjects.forEach(s => {
        g[s.id] = {};
        s.fields.forEach(f => { g[s.id][f] = ''; });
      })
    )
  );
  return g;
};

function App() {
  const [dark, setDark] = useState(false);
  const [tab, setTab] = useState('s3');
  const [grades, setGrades] = useState(initGrades(semesterData));

  const bg      = dark ? 'bg-gray-900' : 'bg-gray-100';
  const card    = dark ? 'bg-gray-800 text-white' : 'bg-white text-gray-900';
  const subText = dark ? 'text-gray-300' : 'text-gray-700';
  const rowUnit = dark ? 'bg-gray-700' : 'bg-red-50';

  const handleChange = (id, field, val) => {
    const num = val === '' ? '' : Math.min(20, Math.max(0, parseFloat(val) || 0));
    setGrades(p => ({ ...p, [id]: { ...p[id], [field]: num } }));
  };

  const subjectAvg = (s) => {
    let total = 0;
    s.fields.forEach(f => { total += (parseFloat(grades[s.id]?.[f]) || 0) * s.weights[f]; });
    return total;
  };

  const unitAvg = (unit) => {
    let pts = 0, coefs = 0;
    unit.subjects.forEach(s => { pts += subjectAvg(s) * s.coef; coefs += s.coef; });
    return coefs ? pts / coefs : 0;
  };

  const semesterAvg = (sem) => {
    let pts = 0, coefs = 0;
    sem.units.forEach(u => u.subjects.forEach(s => {
      pts += subjectAvg(s) * s.coef;
      coefs += s.coef;
    }));
    return coefs ? (pts / coefs).toFixed(2) : '0.00';
  };

  const gpaS3  = parseFloat(semesterAvg(semesterData.s3));
  const gpaS4  = parseFloat(semesterAvg(semesterData.s4));
  const yearly = ((gpaS3 + gpaS4) / 2).toFixed(2);

  const mention = (g) => {
    const n = parseFloat(g);
    if (n >= 16) return 'ممتاز';
    if (n >= 14) return 'جيد جداً';
    if (n >= 12) return 'جيد';
    if (n >= 10) return 'مقبول';
    return 'راسب';
  };

  const avgColor = (v) => parseFloat(v) >= 10 ? 'text-green-600' : 'text-red-500';
  const unitBg   = (v) => parseFloat(v) >= 10
    ? (dark ? 'bg-green-900' : 'bg-green-50')
    : (dark ? 'bg-red-900'   : 'bg-red-50');
  const semBg    = (v) => parseFloat(v) >= 10
    ? 'border-green-500 text-green-600'
    : 'border-red-400 text-red-500';

  const sem = semesterData[tab];
  const avg = semesterAvg(sem);

  return (
    <div className={`min-h-screen ${bg} transition-colors duration-300`}>
      {/* Header */}
      <div className="bg-emerald-600 text-white text-center py-4 px-4 flex items-center justify-between">
        <span className="text-xl font-bold">Academic Transcripts</span>
        <button onClick={() => setDark(!dark)} className="p-2 rounded-full bg-emerald-700 hover:bg-emerald-800">
          <i className={`fas ${dark ? 'fa-sun text-yellow-300' : 'fa-moon text-white'} w-5 h-5`}></i>
        </button>
      </div>

      <div className="max-w-2xl mx-auto px-3 py-4" dir="rtl">
        {/* Tabs */}
        <div className="flex gap-3 mb-4">
          {['s3','s4'].map(s => (
            <button key={s} onClick={() => setTab(s)}
              className={`flex-1 py-2 px-4 rounded-full font-bold border-2 transition-all ${
                tab === s
                  ? 'bg-emerald-600 text-white border-emerald-600'
                  : dark
                    ? 'border-emerald-400 text-emerald-400 bg-transparent'
                    : 'border-emerald-600 text-emerald-600 bg-transparent'
              }`}>
              {s === 's3' ? 'Semestre 3' : 'Semestre 4'}
            </button>
          ))}
        </div>

        {/* Semester Card */}
        <div className={`${card} rounded-xl shadow p-4 mb-4`}>
          <h2 className="font-bold text-lg mb-2">Ingénieur 2ème Année</h2>
          <div className="flex justify-between items-center mb-3">
            <span className={`border-2 ${semBg(avg)} font-bold rounded-full px-4 py-1 text-sm`}>
              Average {sem.label} : {avg}
            </span>
            <span className={`text-sm font-semibold ${avgColor(avg)}`}>{mention(avg)}</span>
          </div>

          {/* Table Header */}
          <div className="flex font-bold text-sm border-b pb-2 mb-1">
            <span className="flex-1">Module</span>
            <span className="w-16 text-center">Coef</span>
            <span className="w-20 text-center">Average</span>
          </div>

          {/* Units & Subjects */}
          {sem.units.map(unit => (
            <div key={unit.id} className="mb-2">
              {unit.subjects.map(s => {
                const a = subjectAvg(s);
                return (
                  <div key={s.id} className={`py-2 border-b ${dark ? 'border-gray-700' : 'border-gray-100'}`}>
                    <div className="flex items-center mb-2">
                      <span className={`flex-1 font-medium text-sm ${subText}`}>{s.name}</span>
                      <span className="w-16 text-center text-sm font-bold">{s.coef}</span>
                      <span className={`w-20 text-center font-bold text-sm ${avgColor(a)}`}>{a.toFixed(2)}</span>
                    </div>
                    <div className="flex gap-2 flex-wrap">
                      {s.fields.map(f => (
                        <div key={f} className="flex flex-col items-center">
                          <span className={`text-xs mb-1 ${dark ? 'text-gray-400' : 'text-gray-500'}`}>
                            {f.toUpperCase()} ({(s.weights[f]*100).toFixed(0)}%)
                          </span>
                          <input
                            type="number" min="0" max="20" step="0.25"
                            value={grades[s.id]?.[f] ?? ''}
                            onChange={e => handleChange(s.id, f, e.target.value)}
                            className={`w-16 text-center px-2 py-1 rounded border text-sm outline-none focus:ring-2 focus:ring-emerald-400 ${
                              dark ? 'bg-gray-700 border-gray-600 text-white' : 'bg-gray-50 border-gray-300 text-gray-900'
                            }`}
                            placeholder="0.00"
                          />
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
              {/* Unit Row */}
              <div className={`flex items-center py-2 px-2 rounded ${unitBg(unitAvg(unit))} mb-1`}>
                <span className={`flex-1 font-bold text-sm ${avgColor(unitAvg(unit))}`}>{unit.name}</span>
                <span className={`w-36 text-center font-bold text-sm ${avgColor(unitAvg(unit))}`}>
                  {unitAvg(unit).toFixed(2)}
                </span>
              </div>
            </div>
          ))}
        </div>

        {/* Bottom GPA Cards */}
        <div className="grid grid-cols-3 gap-3 mt-4">
          <div className={`${card} rounded-xl shadow p-3 text-center`}>
            <p className={`text-xs mb-1 ${dark ? 'text-gray-400' : 'text-gray-500'}`}>معدل S3</p>
            <p className={`text-2xl font-bold ${avgColor(gpaS3)}`}>{gpaS3.toFixed(2)}</p>
            <p className="text-xs text-gray-400">{mention(gpaS3)}</p>
          </div>
          <div className={`${card} rounded-xl shadow p-3 text-center`}>
            <p className={`text-xs mb-1 ${dark ? 'text-gray-400' : 'text-gray-500'}`}>معدل S4</p>
            <p className={`text-2xl font-bold ${avgColor(gpaS4)}`}>{gpaS4.toFixed(2)}</p>
            <p className="text-xs text-gray-400">{mention(gpaS4)}</p>
          </div>
          <div className={`${dark ? 'bg-emerald-700' : 'bg-emerald-600'} rounded-xl shadow p-3 text-center`}>
            <p className="text-xs mb-1 text-emerald-200">المعدل السنوي</p>
            <p className="text-2xl font-bold text-white">{yearly}</p>
            <p className="text-xs text-emerald-200">{mention(yearly)}</p>
          </div>
        </div>

        {/* Telegram */}
        <div className="text-center mt-6 pb-6">
          <a href="https://t.me/uubma" target="_blank" rel="noopener noreferrer"
            className="inline-flex items-center gap-2 bg-blue-500 hover:bg-blue-600 text-white font-semibold px-6 py-3 rounded-lg shadow-lg transition-all hover:scale-105">
            <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.14.18-.357.223-.548.223l.188-2.85 5.18-4.68c.223-.198-.054-.308-.346-.11l-6.4 4.03-2.76-.918c-.6-.187-.612-.6.125-.89l10.782-4.156c.5-.18.943.11.78.89z"/>
            </svg>
            تواصل معي على تلغرام
          </a>
          <p className={`text-xs mt-2 ${dark ? 'text-gray-500' : 'text-gray-400'}`}>جامعة بليدة 1 - كهروتقنية</p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
