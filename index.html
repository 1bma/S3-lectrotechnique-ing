<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة المعدل S3 & S4 - هندسة كهروتقنية</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone@7.22.20/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const semesterData = {
  s3: {
    label: 'Semestre 03',
    units: [
      {
        id: 'uef1_s3',
        name: '(U.E.F) A00F0001S3',
        subjects: [
          { id: 'analyseNum', name: 'Analyse numérique 1', coef: 3, weights: { td: 0.2, tp: 0.2, exam: 0.6 }, fields: ['td', 'tp', 'exam'] },
          { id: 'analyse3',   name: 'Analyse 3',           coef: 3, weights: { td: 0.4, exam: 0.6 },           fields: ['td', 'exam'] },
        ]
      },
      {
        id: 'uef2_s3',
        name: '(U.E.F) A00F0002S3',
        subjects: [
          { id: 'electricite', name: 'Eléctricité fondamentale', coef: 3, weights: { td: 0.2, tp: 0.2, exam: 0.6 }, fields: ['td', 'tp', 'exam'] },
          { id: 'mecanique',   name: 'Mécanique rationnelle',    coef: 2, weights: { td: 0.4, exam: 0.6 },           fields: ['td', 'exam'] },
          { id: 'ondes',       name: 'Ondes et vibrations',      coef: 3, weights: { td: 0.2, tp: 0.2, exam: 0.6 }, fields: ['td', 'tp', 'exam'] },
        ]
      },
      {
        id: 'uem_s3',
        name: '(U.E.M) A00M0001S3',
        subjects: [
          { id: 'dao',    name: 'Dessin assisté par ordinateur', coef: 1, weights: { exam: 1.0 }, fields: ['exam'] },
          { id: 'python', name: 'Programmation Python',          coef: 2, weights: { tp: 0.4, exam: 0.6 }, fields: ['tp', 'exam'] },
        ]
      },
      {
        id: 'uet_s3',
        name: '(U.E.T) A00T0001S3',
        subjects: [
          { id: 'energie',   name: 'Energie et environnement',     coef: 1, weights: { exam: 1.0 }, fields: ['exam'] },
          { id: 'materiaux', name: 'Matériaux en génie électrique', coef: 1, weights: { exam: 1.0 }, fields: ['exam'] },
        ]
      },
    ]
  },
  s4: {
    label: 'Semestre 04',
    units: [
      {
        id: 'uef1_s4',
        name: '(U.E.F) A00F0001S4',
        subjects: [
          { id: 'signal',        name: 'Théorie du signal',         coef: 2, weights: { td: 0.4, exam: 0.6 }, fields: ['td', 'exam'] },
          { id: 'electroniqueF', name: 'Electronique fondamentale', coef: 2, weights: { td: 0.4, exam: 0.6 }, fields: ['td', 'exam'] },
        ]
      },
      {
        id: 'uef2_s4',
        name: '(U.E.F) A00F0002S4',
        subjects: [
          { id: 'electromag',   name: 'Electromagnétisme appliqué',            coef: 2, weights: { td: 0.4, exam: 0.6 },           fields: ['td', 'exam'] },
          { id: 'electrotechF', name: 'Electrotechnique fondamentale',          coef: 2, weights: { td: 0.4, exam: 0.6 },           fields: ['td', 'exam'] },
          { id: 'lcs',          name: 'Logique combinatoire et séquentielle',   coef: 3, weights: { td: 0.2, tp: 0.2, exam: 0.6 }, fields: ['td', 'tp', 'exam'] },
        ]
      },
      {
        id: 'uem_s4',
        name: '(U.E.M) A00M0001S4',
        subjects: [
          { id: 'analyseNum2', name: 'Analyse Numérique 2',                              coef: 2, weights: { tp: 0.4, exam: 0.6 }, fields: ['tp', 'exam'] },
          { id: 'mesures',     name: 'Mesures et métrologie',                             coef: 2, weights: { tp: 0.4, exam: 0.6 }, fields: ['tp', 'exam'] },
          { id: 'tpElec',      name: "Travaux pratiques d'Electronique et électrotechnique", coef: 1, weights: { tp: 1.0 }, fields: ['tp'] },
        ]
      },
      {
        id: 'uet_s4',
        name: '(U.E.T) A00T0001S4',
        subjects: [
          { id: 'teic', name: "Techniques d'information et de communication", coef: 2, weights: { td: 0.4, exam: 0.6 }, fields: ['td', 'exam'] },
        ]
      },
      {
        id: 'ued_s4',
        name: '(U.E.D) A00D0001S4',
        subjects: [
          { id: 'tdee', name: 'Technologies des dispositifs électriques et électroniques', coef: 1, weights: { exam: 1.0 }, fields: ['exam'] },
        ]
      },
    ]
  }
};

const initGrades = (data) => {
  const g = {};
  Object.values(data).forEach(sem =>
    sem.units.forEach(u =>
      u.subjects.forEach(s => {
        g[s.id] = {};
        s.fields.forEach(f => { g[s.id][f] = ''; });
      })
    )
  );
  return g;
};

function App() {
  const [dark, setDark] = useState(false);
  const [tab, setTab] = useState('s3');
  const [grades, setGrades] = useState(initGrades(semesterData));

  const bg      = dark ? 'bg-gray-900 text-white' : 'bg-gray-100 text-gray-950';
  const card    = dark ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200';
  const subText = dark ? 'text-gray-200' : 'text-gray-800';

  const handleChange = (id, field, val) => {
    if (val === '') {
      setGrades(p => ({ ...p, [id]: { ...p[id], [field]: '' } }));
      return;
    }
    const num = Math.min(20, Math.max(0, parseFloat(val) || 0));
    setGrades(p => ({ ...p, [id]: { ...p[id], [field]: num } }));
  };

  const subjectAvg = (s) => {
    let total = 0;
    s.fields.forEach(f => { total += (parseFloat(grades[s.id]?.[f]) || 0) * s.weights[f]; });
    return total;
  };

  const unitAvg = (unit) => {
    let pts = 0, coefs = 0;
    unit.subjects.forEach(s => { pts += subjectAvg(s) * s.coef; coefs += s.coef; });
    return coefs ? pts / coefs : 0;
  };

  const semesterAvg = (sem) => {
    let pts = 0, coefs = 0;
    sem.units.forEach(u => u.subjects.forEach(s => {
      pts += subjectAvg(s) * s.coef;
      coefs += s.coef;
    }));
    return coefs ? (pts / coefs).toFixed(2) : '0.00';
  };

  const gpaS3  = parseFloat(semesterAvg(semesterData.s3));
  const gpaS4  = parseFloat(semesterAvg(semesterData.s4));
  const yearly = ((gpaS3 + gpaS4) / 2).toFixed(2);

  const mention = (g) => {
    const n = parseFloat(g);
    if (n >= 16) return 'ممتاز';
    if (n >= 14) return 'جيد جداً';
    if (n >= 12) return 'جيد';
    if (n >= 10) return 'مقبول';
    return 'راسب';
  };

  const avgColor = (v) => parseFloat(v) >= 10 ? 'text-green-500 font-bold' : 'text-red-500 font-bold';
  const unitBg   = (v) => parseFloat(v) >= 10
    ? (dark ? 'bg-green-950/40 border border-green-800' : 'bg-green-50 border border-green-200')
    : (dark ? 'bg-red-950/40 border border-red-900'   : 'bg-red-50 border border-red-200');
  const semBg    = (v) => parseFloat(v) >= 10
    ? 'border-green-500 text-green-500 bg-green-500/10'
    : 'border-red-500 text-red-500 bg-red-500/10';

  const sem = semesterData[tab];
  const avg = semesterAvg(sem);

  return (
    <div className={`min-h-screen ${bg} transition-colors duration-300 font-sans pb-10`}>
      {/* Header */}
      <div className="bg-emerald-600 text-white text-center py-4 px-6 flex items-center justify-between shadow-md">
        <span className="text-xl font-bold tracking-wide">Academic Transcripts</span>
        <button onClick={() => setDark(!dark)} className="p-2.5 rounded-full bg-emerald-700 hover:bg-emerald-800 transition-all">
          <i className={`fa-solid ${dark ? 'fa-sun text-yellow-300' : 'fa-moon text-white'} text-lg`}></i>
        </button>
      </div>

      <div className="max-w-2xl mx-auto px-4 py-6">
        {/* Tabs */}
        <div className="flex gap-4 mb-6">
          {['s3','s4'].map(s => (
            <button key={s} onClick={() => setTab(s)}
              className={`flex-1 py-3 px-4 rounded-xl font-bold border-2 transition-all shadow-sm ${
                tab === s
                  ? 'bg-emerald-600 text-white border-emerald-600 scale-[1.02]'
                  : dark
                    ? 'border-gray-700 text-emerald-400 bg-gray-800 hover:bg-gray-700'
                    : 'border-gray-300 text-emerald-600 bg-white hover:bg-gray-50'
              }`}>
              {s === 's3' ? 'Semestre 3' : 'Semestre 4'}
            </button>
          ))}
        </div>

        {/* Semester Card */}
        <div className={`${card} rounded-2xl shadow-xl p-5 border mb-6 transition-all`}>
          <h2 className="font-bold text-xl mb-3 border-b pb-2 text-emerald-600">Ingénieur 2ème Année</h2>
          
          <div className="flex justify-between items-center mb-5 gap-2">
            <span className={`border-2 ${semBg(avg)} font-bold rounded-xl px-4 py-2 text-sm`}>
              Average {sem.label} : {avg}
            </span>
            <span className={`text-base font-bold px-3 py-1 rounded-lg ${parseFloat(avg) >= 10 ? 'bg-green-500/10 text-green-500' : 'bg-red-500/10 text-red-500'}`}>
              {mention(avg)}
            </span>
          </div>

          {/* Table Header */}
          <div className="flex font-bold text-xs uppercase tracking-wider text-gray-400 border-b pb-2 mb-3" dir="ltr">
            <span className="flex-1 text-left">Module</span>
            <span className="w-14 text-center">Coef</span>
            <span className="w-20 text-right">Average</span>
          </div>

          {/* Units & Subjects */}
          {sem.units.map(unit => (
            <div key={unit.id} className="mb-5 last:mb-0">
              {unit.subjects.map(s => {
                const a = subjectAvg(s);
                return (
                  <div key={s.id} className={`py-3 border-b last:border-0 ${dark ? 'border-gray-700' : 'border-gray-100'}`}>
                    <div className="flex items-center mb-3 gap-2" dir="ltr">
                      <span className={`flex-1 font-semibold text-sm ${subText} text-left truncate`}>{s.name}</span>
                      <span className="w-14 text-center text-sm font-bold text-gray-400">{s.coef}</span>
                      <span className={`w-20 text-right text-sm ${avgColor(a)}`}>{a.toFixed(2)}</span>
                    </div>
                    
                    {/* Input Fields */}
                    <div className="flex gap-3 flex-wrap justify-start items-center mb-1" dir="ltr">
                      {s.fields.map(f => (
                        <div key={f} className="flex flex-col items-start bg-gray-500/5 p-2 rounded-lg border border-gray-500/10">
                          <span className="text-[10px] font-bold text-gray-400 uppercase mb-1">
                            {f} ({(s.weights[f]*100).toFixed(0)}%)
                          </span>
                          <input
                            type="number" min="0" max="20" step="0.25"
                            value={grades[s.id]?.[f] ?? ''}
                            onChange={e => handleChange(s.id, f, e.target.value)}
                            className={`w-16 text-center font-bold px-1.5 py-1 rounded-md text-sm outline-none focus:ring-2 focus:ring-emerald-500 transition-all ${
                              dark ? 'bg-gray-700 border-gray-600 text-white' : 'bg-white border-gray-300 text-gray-900'
                            }`}
                            placeholder="0.00"
                          />
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
              
              {/* Unit Row Summary */}
              <div className={`flex items-center py-2.5 px-3 rounded-xl ${unitBg(unitAvg(unit))} mt-2`} dir="ltr">
                <span className="flex-1 font-bold text-xs truncate text-left">{unit.name}</span>
                <span className="w-24 text-right font-black text-sm">
                  {unitAvg(unit).toFixed(2)}
                </span>
              </div>
            </div>
          ))}
        </div>

        {/* Bottom GPA Cards */}
        <div className="grid grid-cols-3 gap-3 mt-4">
          <div className={`${card} border rounded-2xl shadow-md p-3 text-center flex flex-col justify-between`}>
            <p className="text-xs font-bold text-gray-400 mb-1">معدل S3</p>
            <p className={`text-xl ${avgColor(gpaS3)}`}>{gpaS3.toFixed(2)}</p>
            <p className="text-[10px] font-semibold text-gray-400 mt-1 truncate">{mention(gpaS3)}</p>
          </div>
          
          <div className={`${card} border rounded-2xl shadow-md p-3 text-center flex flex-col justify-between`}>
            <p className="text-xs font-bold text-gray-400 mb-1">معدل S4</p>
            <p className={`text-xl ${avgColor(gpaS4)}`}>{gpaS4.toFixed(2)}</p>
            <p className="text-[10px] font-semibold text-gray-400 mt-1 truncate">{mention(gpaS4)}</p>
          </div>
          
          <div className={`${dark ? 'bg-emerald-700 text-white' : 'bg-emerald-600 text-white'} rounded-2xl shadow-md p-3 text-center flex flex-col justify-between scale-[1.03]`}>
            <p className="text-xs font-bold text-emerald-100 mb-1">المعدل السنوي</p>
            <p className="text-2xl font-black">{yearly}</p>
            <p className="text-[10px] font-bold text-emerald-200 mt-1 truncate">{mention(yearly)}</p>
          </div>
        </div>

        {/* Footer Link */}
        <div className="text-center mt-8">
          <a href="https://t.me/uubma" target="_blank" rel="noopener noreferrer"
            className="inline-flex items-center gap-2 bg-blue-500 hover:bg-blue-600 text-white font-bold px-6 py-3 rounded-xl shadow-md transition-all hover:scale-105 active:scale-95 text-sm">
            <i className="fa-brands fa-telegram text-lg"></i>
            تواصل معي على تلغرام
          </a>
          <p className="text-[11px] mt-3 font-semibold text-gray-400 tracking-wide">جامعة البليدة 1 — هندسة كهروتقنية</p>
        </div>
      </div>
    </div>
  );
}

// Render the application to the DOM securely using React 18 standards
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
